kind = "web"
previewPath = "/"
title = "Product Video Finder"
version = "1.0.0"
id = "artifacts/video-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20489

[services.development]
run = "pnpm --filter @workspace/video-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-finder", "run", "build" ]
publicDir = "artifacts/video-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20489"
BASE_PATH = "/"
